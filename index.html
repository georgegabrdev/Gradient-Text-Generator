<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gradient Text Generator - BetterChat</title>
    <link rel="icon" type="image/png" sizes="32x32" href="favicon.ico">
    <style>
        body { font-family: 'Segoe UI', sans-serif; padding: 20px; background: #0f0f0f; color: #e0e0e0; display: flex; justify-content: center; }
        .container { max-width: 750px; width: 100%; background: #181818; padding: 25px; border-radius: 12px; border: 1px solid #333; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        h2 { color: #00ff88; margin-top: 0; text-align: center; letter-spacing: 1px; }
        label { display: block; margin: 15px 0 5px; font-weight: 600; color: #888; font-size: 13px; }
        
        textarea { width: 100%; height: 80px; padding: 12px; border-radius: 6px; border: 1px solid #444; background: #222; color: #fff; box-sizing: border-box; font-size: 15px; resize: vertical; }
        select { width: 100%; padding: 10px; border-radius: 6px; background: #222; color: #fff; border: 1px solid #444; cursor: pointer; margin-bottom: 5px; }
        
        #keyframe-container { background: #222; padding: 15px; border-radius: 6px; border: 1px solid #333; margin-bottom: 10px; }
        .keyframe-item { display: flex; align-items: center; gap: 15px; margin-bottom: 10px; }
        .color-picker { flex-grow: 1; height: 35px; border: none; background: none; cursor: pointer; }
        .remove-btn { background: #333; color: #ff4444; border: 1px solid #444; border-radius: 4px; cursor: pointer; font-weight: bold; padding: 5px 12px; transition: 0.2s; }
        .remove-btn:hover { background: #ff4444; color: #fff; }

        .options-row { display: flex; align-items: center; margin: 15px 0; background: #222; padding: 10px; border-radius: 6px; border: 1px solid #333; justify-content: space-between; }
        .checkbox-group { display: flex; align-items: center; }
        .checkbox-group input { margin-right: 10px; transform: scale(1.2); cursor: pointer; }
        .char-counter { font-size: 12px; font-family: monospace; color: #00ff88; font-weight: bold; }
        
        .btn { width: 100%; padding: 15px; margin-top: 10px; border: none; border-radius: 6px; background: #00ff88; color: #000; font-weight: 800; cursor: pointer; font-size: 15px; transition: 0.2s; }
        .btn:hover { background: #00cc6e; transform: translateY(-1px); }
        .btn-secondary { background: #333; color: #00ff88; border: 1px solid #444; margin-bottom: 20px; }

        #visual-preview { 
            margin-top: 5px; padding: 20px; background: #111; border-radius: 6px; border: 1px solid #444; min-height: 50px; 
            font-size: 24px; font-weight: bold; text-align: center; letter-spacing: 1px; word-wrap: break-word; overflow-wrap: break-word;
            display: block; white-space: pre-wrap;
        }
        #preview { 
            margin-top: 5px; padding: 15px; background: #000; border-radius: 6px; font-family: monospace; font-size: 11px; color: #888; border: 1px solid #333; 
            max-height: 150px; overflow-y: auto; word-wrap: break-word;
        }
        .placeholder { color: #444; font-style: italic; font-size: 18px; }
        .success-msg { color: #00ff88; text-align: center; margin-top: 10px; font-weight: bold; opacity: 0; transition: 0.3s; }
    </style>
</head>
<body>

<div class="container">
    <h2>Gradient Text Generator</h2>
    
    <label>INPUT TEXT</label>
    <textarea id="input" placeholder="Enter text to colorize...">Hello World!</textarea>

    <label>COLOR KEYFRAMES</label>
    <div id="keyframe-container">
        <div class="keyframe-item">
            <input type="color" class="color-picker" value="#00ff88">
            <button class="remove-btn" onclick="removeKeyframe(this)" style="visibility: hidden;">×</button>
        </div>
        <div class="keyframe-item">
            <input type="color" class="color-picker" value="#0077ff">
            <button class="remove-btn" onclick="removeKeyframe(this)">×</button>
        </div>
    </div>
    <button class="btn btn-secondary" onclick="addKeyframe()">+ Add Color Keyframe</button>

    <label>CHOOSE FONT</label>
    <select id="font-select">
        <option value="">No Font</option>
    </select>

    <label>CHOOSE MODE</label>
    <select id="mode">
        <option value="combined">Combined: (#color / [#dark / t])</option>
        <option value="text-only">Text Color Only: (#color / t)</option>
        <option value="outline-only">Outline Color: [#color / t]</option>
    </select>

    <div class="options-row">
        <div class="checkbox-group">
            <input type="checkbox" id="compress">
            <label for="compress" style="margin: 0; cursor: pointer; color: #fff;">Compress Characters</label>
        </div>
        <div class="char-counter">Chars: <span id="char-count">0</span> / 100,000</div>
    </div>

    <label>LIVE PREVIEW</label>
    <div id="visual-preview"></div>
    
    <button class="btn" onclick="copyResult()">Copy Result</button>
    <div id="status" class="success-msg">Copied to clipboard!</div>

    <label>EXPORT CODE (RAW)</label>
    <div id="preview"></div>
</div>

<script>
    const robloxFonts = [
        "Legacy", "Arial", "ArialBold", "SourceSans", "SourceSansBold", "SourceSansLight", "SourceSansItalic",
        "Bodoni", "Garamond", "Cartoon", "Code", "Highway", "SciFi", "Arcade", "Fantasy", "Antique",
        "SourceSansSemibold", "Gotham", "GothamMedium", "GothamBold", "GothamBlack", "AmaticSC", "Bangers",
        "Creepster", "DenkOne", "Fondamento", "FredokaOne", "GrenzeGotisch", "IndieFlower", "JosefinSans",
        "Jura", "Kalam", "LuckiestGuy", "Merriweather", "Michroma", "Nunito", "Oswald", "PatrickHand",
        "PermanentMarker", "Roboto", "RobotoCondensed", "RobotoMono", "Sarpanch", "SpecialElite",
        "TitilliumWeb", "Ubuntu", "BuilderSans", "BuilderSansMedium", "BuilderSansBold", "BuilderSansExtraBold",
        "Arimo", "ArimoBold"
    ];

    const fontDropdown = document.getElementById('font-select');
    robloxFonts.forEach((font, index) => {
        let opt = document.createElement('option');
        opt.value = font;
        opt.innerHTML = `${index}: ${font}`;
        fontDropdown.appendChild(opt);
    });

    function hexToRgb(hex) {
        const r = parseInt(hex.slice(1, 3), 16);
        const g = parseInt(hex.slice(3, 5), 16);
        const b = parseInt(hex.slice(5, 7), 16);
        return { r, g, b };
    }

    function rgbToHex(r, g, b) {
        return "#" + [r, g, b].map(x => Math.round(Math.max(0, Math.min(255, x))).toString(16).padStart(2, '0')).join('');
    }

    function interpolateColor(color1, color2, factor) {
        const c1 = hexToRgb(color1);
        const c2 = hexToRgb(color2);
        const r = c1.r + factor * (c2.r - c1.r);
        const g = c1.g + factor * (c2.g - c1.g);
        const b = c1.b + factor * (c2.b - c1.b);
        return rgbToHex(r, g, b);
    }

    function addKeyframe() {
        const container = document.getElementById('keyframe-container');
        const div = document.createElement('div');
        div.className = 'keyframe-item';
        div.innerHTML = `
            <input type="color" class="color-picker" value="#${Math.floor(Math.random()*16777215).toString(16).padStart(6, '0')}">
            <button class="remove-btn" onclick="removeKeyframe(this)">×</button>
        `;
        container.appendChild(div);
        div.querySelector('input').addEventListener('input', generate);
        generate();
    }

    function removeKeyframe(btn) {
        const items = document.querySelectorAll('.keyframe-item');
        if (items.length > 2) {
            btn.parentElement.remove();
            generate();
        }
    }

    function generate() {
        const text = document.getElementById('input').value;
        const selectedMode = document.getElementById('mode').value;
        const selectedFont = fontDropdown.value;
        const isCompressed = document.getElementById('compress').checked;
        const slash = isCompressed ? "/" : " / ";
        
        const colorPickers = document.querySelectorAll('.color-picker');
        const colors = Array.from(colorPickers).map(p => p.value);

        const visualPreview = document.getElementById('visual-preview');
        const preview = document.getElementById('preview');
        const charCount = document.getElementById('char-count');

        if (!text) {
            visualPreview.innerHTML = '<span class="placeholder">Type something to see preview...</span>';
            preview.innerText = "";
            charCount.innerText = "0";
            return "";
        }

        let codeResult = "";
        let visualHTML = "";

        for (let i = 0; i < text.length; i++) {
            if (text[i] === " ") { 
                codeResult += " "; visualHTML += " "; continue; 
            }

            const factor = text.length > 1 ? i / (text.length - 1) : 0;
            const segmentCount = colors.length - 1;
            const scaledFactor = factor * segmentCount;
            const idx = Math.min(Math.floor(scaledFactor), segmentCount - 1);
            const localFactor = scaledFactor - idx;

            const hex = interpolateColor(colors[idx], colors[idx+1], localFactor);
            
            const c = hexToRgb(hex);
            const darkHex = rgbToHex(c.r * 0.3, c.g * 0.3, c.b * 0.3);

            let charStyle = "";
            if (selectedMode === "text-only") {
                codeResult += `(${hex}${slash}${text[i]})`;
                charStyle = `color: ${hex};`;
            } else if (selectedMode === "outline-only") {
                codeResult += `[${hex}${slash}${text[i]}]`;
                charStyle = `color: white; text-shadow: 1px 1px 2px ${hex}, -1px -1px 2px ${hex};`;
            } else if (selectedMode === "combined") {
                codeResult += `(${hex}${slash}[${darkHex}${slash}${text[i]}])`;
                charStyle = `color: ${hex}; text-shadow: 2px 2px 0px ${darkHex};`;
            }
            visualHTML += `<span style="${charStyle}">${text[i]}</span>`;
        }

        if (selectedFont !== "") {
            codeResult = `<${selectedFont}${slash}${codeResult}>`;
        }

        preview.innerText = codeResult;
        visualPreview.innerHTML = visualHTML;
        visualPreview.style.fontFamily = selectedFont ? `"${selectedFont}", sans-serif` : "inherit";
        charCount.innerText = codeResult.length;
        charCount.style.color = codeResult.length > 100000 ? "#ff4444" : "#00ff88";
        
        return codeResult;
    }

    function copyResult() {
        const code = generate();
        if (!code) return;
        navigator.clipboard.writeText(code).then(() => {
            const status = document.getElementById('status');
            status.style.opacity = '1';
            setTimeout(() => status.style.opacity = '0', 2000);
        });
    }

    document.getElementById('input').addEventListener('input', generate);
    document.getElementById('mode').addEventListener('change', generate);
    document.getElementById('compress').addEventListener('change', generate);
    fontDropdown.addEventListener('change', generate);
    document.querySelectorAll('.color-picker').forEach(p => p.addEventListener('input', generate));

    generate();
</script>

</body>
</html>
